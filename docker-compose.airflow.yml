services:
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: notifyops-airflow:2.9.3
    container_name: notifyops-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/notifyops
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    command: >
      bash -c "set -e;
      airflow db migrate;
      airflow users create --username admin --password admin --firstname Notify --lastname Ops --role Admin --email admin@example.com || true;
      airflow scheduler &
      exec airflow webserver --host 0.0.0.0 --port 8080"
